name: Manual Pipeline Controls

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - full_pipeline
          - import_only
          - stats_only
          - predictions_only
          - evaluate_only
          - retrain_models
          - check_api_budget

jobs:
  run_selected_job:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Create data directories
        run: mkdir -p data/{fixtures,predictions,teams,leagues,accuracy,models,logs,matches,h2h,referees}

      - name: Run full pipeline
        if: inputs.job == 'full_pipeline'
        run: |
          python -m pipeline.step1_import_data
          python -m pipeline.step2_calculate_stats
          python -m pipeline.step3_generate_predictions
          python -m pipeline.step4_evaluate_results
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON || '2024' }}
          MODEL_VERSION: ${{ vars.MODEL_VERSION || 'v1.0.0' }}

      - name: Import only
        if: inputs.job == 'import_only'
        run: python -m pipeline.step1_import_data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Stats only
        if: inputs.job == 'stats_only'
        run: python -m pipeline.step2_calculate_stats

      - name: Predictions only
        if: inputs.job == 'predictions_only'
        run: python -m pipeline.step3_generate_predictions

      - name: Evaluate only
        if: inputs.job == 'evaluate_only'
        run: python -m pipeline.step4_evaluate_results

      - name: Retrain ML models
        if: inputs.job == 'retrain_models'
        run: python -m pipeline.step5_train_models

      - name: Check API budget
        if: inputs.job == 'check_api_budget'
        run: |
          python -c "
          import httpx, os, json
          from datetime import date, timedelta

          key = os.environ.get('FOOTBALL_DATA_API_KEY', '')
          print(f'Key found: {\"YES - length \" + str(len(key)) if key else \"NO - KEY IS MISSING\"}')
          print(f'Key preview: {key[:8]}...' if len(key) > 8 else f'Key value: [{key}]')

          if not key:
              print('ERROR: FOOTBALL_DATA_API_KEY secret is not set in GitHub')
              exit(1)

          headers = {'X-Auth-Token': key}
          date_from = date.today().isoformat()
          date_to   = (date.today() + timedelta(days=14)).isoformat()
          url = f'https://api.football-data.org/v4/competitions/PL/matches'
          params = {'dateFrom': date_from, 'dateTo': date_to}

          print(f'Testing URL: {url}')
          print(f'Date range: {date_from} to {date_to}')

          r = httpx.get(url, headers=headers, params=params, timeout=15)
          print(f'HTTP Status: {r.status_code}')
          data = r.json()
          print(f'Response keys: {list(data.keys())}')
          if 'matches' in data:
              print(f'Matches found: {len(data[\"matches\"])}')
              if data['matches']:
                  m = data['matches'][0]
                  print(f'First match: {m[\"homeTeam\"][\"name\"]} vs {m[\"awayTeam\"][\"name\"]} on {m[\"utcDate\"]}')
          else:
              print(f'Full response: {json.dumps(data, indent=2)[:500]}')
          "
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Commit changes
        if: inputs.job != 'check_api_budget'
        run: |
          git config user.name "Manual Pipeline Bot"
          git config user.email "bot@github-actions.com"
          git add data/
          git diff --staged --quiet || git commit -m "Manual run: ${{ inputs.job }} $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
