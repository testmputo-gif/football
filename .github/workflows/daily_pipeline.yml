name: Daily Prediction Pipeline

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force ML model retraining'
        required: false
        default: 'false'
        type: boolean
      skip_import:
        description: 'Skip API import (use existing data)'
        required: false
        default: 'false'
        type: boolean

jobs:
  daily_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Create data directories
        run: mkdir -p data/{fixtures,predictions,teams,leagues,accuracy,models,logs,matches,h2h,referees}

      - name: Step 1 - Import data from football API
        if: ${{ inputs.skip_import != 'true' }}
        run: python -m pipeline.step1_import_data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON || '2025' }}

      - name: Step 2 - Calculate team statistics
        run: python -m pipeline.step2_calculate_stats

      - name: Step 3 - Generate predictions
        run: python -m pipeline.step3_generate_predictions
        env:
          MODEL_VERSION: ${{ vars.MODEL_VERSION || 'v1.0.0' }}

      - name: Step 4 - Evaluate prediction results
        run: python -m pipeline.step4_evaluate_results

      - name: Commit all updated data files
        run: |
          git config user.name "Prediction Bot"
          git config user.email "bot@github-actions.com"
          git add data/
          git status
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Daily predictions $(date +%Y-%m-%d)"
            git push
            echo "Data committed and pushed successfully"
          fi

      - name: Pipeline summary
        if: always()
        run: |
          echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json, os
          from datetime import date
          summary = []
          try:
              pred = json.load(open('data/predictions/latest.json'))
              n    = len(pred.get('fixtures', []))
              made = sum(1 for f in pred.get('fixtures', []) if not f.get('no_prediction_reason'))
              summary.append(f'- Fixtures with predictions: {made}/{n}')
          except Exception as e:
              summary.append(f'- Could not read predictions: {e}')
          try:
              acc  = json.load(open('data/accuracy/results.json'))
              o25  = acc.get('by_market', {}).get('over25', {})
              if o25.get('total', 0) > 0:
                  pct = o25[\"correct\"] / o25[\"total\"] * 100
                  summary.append(f'- Over 2.5 accuracy: {pct:.1f}% ({o25[\"correct\"]}/{o25[\"total\"]})')
          except:
              pass
          for line in summary:
              print(line)
          " >> $GITHUB_STEP_SUMMARY

  monthly_retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: daily_pipeline
    if: github.event_name == 'workflow_dispatch' && inputs.force_retrain == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Create data directories
        run: mkdir -p data/{fixtures,predictions,teams,leagues,accuracy,models,logs,matches,h2h,referees}

      - name: Train ML models
        run: python -m pipeline.step5_train_models
        env:
          MODEL_VERSION: ${{ vars.MODEL_VERSION || 'v1.0.0' }}

      - name: Commit updated models
        run: |
          git config user.name "ML Training Bot"
          git config user.email "mlbot@github-actions.com"
          git add data/models/
          git status
          if git diff --staged --quiet; then
            echo "No model changes"
          else
            git commit -m "Monthly model retrain $(date +%Y-%m)"
            git push
            echo "Models committed and pushed"
          fi
