name: Deploy to Vercel

# Triggers when the pipeline commits fresh data to main
on:
  push:
    branches: [main]
    paths:
      - 'data/**'           # Only redeploy when data changes
      - 'frontend/**'       # Or when frontend code changes

  # Allow manual deploy
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Deployment complete
        run: |
          echo "## Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "Fresh predictions are live on Vercel." >> $GITHUB_STEP_SUMMARY
