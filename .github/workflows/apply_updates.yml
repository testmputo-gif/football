      - name: Commit and push
        run: |
          git config user.name "Auto-Update Bot"
          git config user.email "bot@github-actions.com"
          git add -A
          git status
          git diff --staged --stat
          git commit -m "Auto-update: apply latest code changes $(date +%Y-%m-%d)"
          git push
          echo "Done - Vercel will auto-deploy now"

      - name: Summary
        run: |
          echo "## Files updated" >> $GITHUB_STEP_SUMMARY
          git diff HEAD~1 --name-only >> $GITHUB_STEP_SUMMARY || echo "Check git log" >> $GITHUB_STEP_SUMMARY
