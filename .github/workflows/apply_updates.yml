name: Apply Code Updates

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply_updates:
    runs-on: ubuntu-latest
    env:
      STEP1_B64: 
      FIXT_B64: 
      PRED_B64: 
      FIX_B64: 
      SUM_B64: 

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Write all files via Python
        run: |
          python3 - <<'PYEOF'
          import base64, os
          files = {
              "pipeline/step1_import_data.py": os.environ["STEP1_B64"],
              "frontend/src/pages/FixturesPage.jsx": os.environ["FIXT_B64"],
              "frontend/src/pages/PredictionPage.jsx": os.environ["PRED_B64"],
          }
          for path, b64 in files.items():
              import pathlib
              pathlib.Path(path).parent.mkdir(parents=True, exist_ok=True)
              with open(path, "wb") as f:
                  f.write(base64.b64decode(b64))
              print(f"Written: {path}")
          PYEOF

      - name: Fix team IDs in data files
        run: |
          python3 - <<'PYEOF'
          import base64, os
          fix_code = base64.b64decode(os.environ["FIX_B64"]).decode()
          exec(fix_code)
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "Update Bot"
          git config user.email "bot@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix canonical team IDs + 3 data sources + date tabs"
            git push
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt --quiet

      - name: Create data directories
        run: mkdir -p data/fixtures data/predictions data/teams data/leagues data/accuracy data/models data/logs data/matches data/h2h data/referees

      - name: Run pipeline
        run: |
          python -m pipeline.step1_import_data
          python -m pipeline.step2_calculate_stats
          python -m pipeline.step3_generate_predictions
          python -m pipeline.step4_evaluate_results
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          CURRENT_SEASON: "2025"
          MODEL_VERSION: "v1.0.0"

      - name: Fix venue dicts in pipeline output
        run: |
          python3 - <<'PYEOF'
          import base64, os
          fix_code = base64.b64decode(os.environ["FIX_B64"]).decode()
          exec(fix_code)
          PYEOF

      - name: Commit pipeline data
        run: |
          git config user.name "Pipeline Bot"
          git config user.email "bot@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data"
          else
            git commit -m "Pipeline data $(date +%Y-%m-%d)"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          python3 - <<'PYEOF'
          import base64, os, sys
          code = base64.b64decode(os.environ["SUM_B64"]).decode()
          exec(code)
          PYEOF
          >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Could not generate summary" >> $GITHUB_STEP_SUMMARY
