name: Apply Code Updates

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply_updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Install Python and write files
        run: |
          python3 - << 'PYEOF'
          import base64, pathlib, os

          files = {
              "pipeline/step1_import_data.py": "",
              "frontend/src/pages/FixturesPage.jsx": "",
              "frontend/src/pages/PredictionPage.jsx": "",
          }
          for path, b64 in files.items():
              pathlib.Path(path).parent.mkdir(parents=True, exist_ok=True)
              data = base64.b64decode(b64)
              with open(path, "wb") as f:
                  f.write(data)
              print(f"Written {path} ({len(data)} bytes)")
          PYEOF

      - name: Fix team IDs in data
        run: |
          python3 - << 'PYEOF'
          import base64
          code = base64.b64decode("").decode()
          exec(code)
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "Update Bot"
          git config user.email "bot@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Rebuilt step1 + fix canonical team IDs"
            git push
          fi

      - name: Setup Python for pipeline
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt --quiet

      - name: Create data directories
        run: mkdir -p data/fixtures data/predictions data/teams data/leagues data/accuracy data/models data/logs data/matches data/h2h data/referees

      - name: Run pipeline
        run: |
          python -m pipeline.step1_import_data
          python -m pipeline.step2_calculate_stats
          python -m pipeline.step3_generate_predictions
          python -m pipeline.step4_evaluate_results
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          CURRENT_SEASON: "2025"
          MODEL_VERSION: "v1.0.0"

      - name: Commit pipeline data
        run: |
          git config user.name "Pipeline Bot"
          git config user.email "bot@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data"
          else
            git commit -m "Pipeline $(date +%Y-%m-%d)"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import base64, sys
          code = base64.b64decode("").decode()
          exec(code)
          PYEOF
          >> $GITHUB_STEP_SUMMARY 2>&1 || true
