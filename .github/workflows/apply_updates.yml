      - name: Commit all changes
        run: |
          git config user.name "Auto-Update Bot"
          git config user.email "bot@github-actions.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix venue dict crash + date tabs + Finnish league labels"
            git push
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt --quiet

      - name: Create data directories
        run: |
          mkdir -p data/fixtures data/predictions data/teams data/leagues
          mkdir -p data/accuracy data/models data/logs data/matches data/h2h data/referees

      - name: Run full pipeline
        run: |
          echo "=== Step 1: Import all fixtures ==="
          python -m pipeline.step1_import_data
          echo "=== Step 2: Calculate statistics ==="
          python -m pipeline.step2_calculate_stats
          echo "=== Step 3: Generate predictions ==="
          python -m pipeline.step3_generate_predictions
          echo "=== Step 4: Evaluate results ==="
          python -m pipeline.step4_evaluate_results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          CURRENT_SEASON: "2025"
          MODEL_VERSION: "v1.0.0"

      - name: Fix venue dicts in new pipeline output
        run: python3 /tmp/fix_data.py

      - name: Commit pipeline data
        run: |
          git config user.name "Pipeline Bot"
          git config user.email "bot@github-actions.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data"
          else
            git commit -m "Pipeline data $(date +%Y-%m-%d)"
            git push
            echo "Deployed"
          fi

